# Alembic configuration for Agentic Development Platform
#
# This file is consumed by the `alembic` command‑line tool only.
# Actual database URL and logging are wired through `alembic/env.py`.

# Where the migration scripts live.
script_location = alembic

# Version file naming template.
# By default this produces files like "versions/001_add_tasks.py".
# Uncomment the line below to include a datetime prefix.
file_template = %%(rev)s_%%(slug)s
# file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Version location (migration scripts directory).
version_locations = alembic/versions

# Path separator for `version_locations` and `prepend_sys_path`.
# Uses the OS default (":" on Unix, ";" on Windows).
path_separator = os

# Prepend a path to `sys.path` before running migrations.
prepend_sys_path = .

# Database URL.
# This is only a default; the project config in `alembic/env.py` overrides it.
# Examples:
#   sqlite:///./dev.sqlite3
#   postgresql+asyncpg://user:pass@localhost/agentic_dev
sqlalchemy.url = sqlite:///./dev.sqlite3

# Logging setup.
# Alembic and SQLAlchemy loggers are wired through `env.py` as well.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
